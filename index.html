<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stunden App VZ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#f4f2f6;
font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
color:#222
}

header{
background:linear-gradient(135deg,#3a1b4c,#9b55c7);
color:#fff;
padding:24px 18px;
display:flex;
gap:14px;
align-items:center
}

.logo{
width:62px;
height:62px;
border-radius:50%;
background:#fff;
color:#7b3f98;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:30px
}

h1{
margin:0;
font-size:28px
}

main{
padding:16px;
max-width:760px;
margin:auto
}

.card{
background:#fff;
border-radius:22px;
padding:18px;
margin-bottom:16px
}

label{
font-weight:800;
display:block;
margin:10px 0 8px
}

input{
width:100%;
font-size:18px;
padding:14px;
border-radius:18px;
border:1px solid #ddd
}

button{
font-size:17px;
font-weight:900;
border:0;
border-radius:18px;
padding:15px;
margin-top:12px;
width:100%;
cursor:pointer
}

#saveBtn{
background:#2e9b57;
color:white
}

#pdfBtn{
background:#efe2f5;
color:#6e328b
}

#resetBtn{
background:#fff0f0;
color:#c62828
}

.summary{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.box{
background:#fbf2ff;
border-radius:18px;
padding:18px
}

.box span{
display:block;
font-size:26px;
color:#6e328b;
font-weight:900
}

.meldung{
display:none;
background:#e9f8ee;
color:#18794e;
padding:12px;
border-radius:12px;
margin-top:12px;
font-weight:700
}

.eintrag{
border:1px solid #eee;
border-radius:18px;
padding:14px;
margin-top:12px;
background:#fafafa
}

.hinweis{
color:#666;
line-height:1.4
}

@media print{
header,.formular,button{
display:none
}
}
</style>
</head>

<body>

<header>
<div class="logo">VZ</div>

<div>
<h1>Stunden App</h1>
<div>Stundennachweis & Fahrtenbuch</div>
</div>
</header>

<main>

<div class="card formular">

<label>Name</label>
<input id="name" value="Vlora Zogaj">

<label>Beschäftigungsnummer</label>
<input id="bnr" placeholder="Später eintragen">

<label>Monat</label>
<input id="monat" value="Mai 2026">

</div>

<div class="summary">

<div class="box">
Stunden gesamt
<span id="stundenGesamt">0 h</span>
</div>

<div class="box">
KM gesamt
<span id="kmGesamt">0 km</span>
</div>

</div>

<div class="card formular">

<label>Datum</label>
<input id="datum" type="date">

<label>Stunden</label>
<input id="stunden" type="number">

<label>Kilometer</label>
<input id="km" type="number">

<button id="saveBtn">Speichern</button>

<button id="pdfBtn">PDF drucken</button>

<button id="resetBtn">Alles löschen</button>

<div class="meldung" id="meldung">
Gespeichert
</div>

</div>

<div class="card">

<h2>Einträge</h2>

<div id="liste"></div>

</div>

</main>

<script>

let eintraege = JSON.parse(localStorage.getItem("vz_eintraege") || "[]")

anzeigen()

document.getElementById("saveBtn").onclick = () => {

const datum = document.getElementById("datum").value
const stunden = document.getElementById("stunden").value
const km = document.getElementById("km").value

if(!datum || !stunden){
alert("Bitte Datum und Stunden eingeben")
return
}

// Keine gleichen Datums erlauben
if (eintraege.some(e => e.datum === datum)) {
alert("Dieses Datum existiert bereits!")
return
}

eintraege.push({
datum,
stunden:Number(stunden),
km:Number(km || 0)
})

speichern()

document.getElementById("datum").value=""
document.getElementById("stunden").value=""
document.getElementById("km").value=""

const m = document.getElementById("meldung")
m.style.display="block"

setTimeout(()=>{
m.style.display="none"
},1500)

anzeigen()

}

document.getElementById("pdfBtn").onclick = () => {
window.print()
}

document.getElementById("resetBtn").onclick = () => {

if(confirm("Alles löschen?")){

eintraege=[]

speichern()

anzeigen()

}

}

function speichern(){
localStorage.setItem("vz_eintraege",JSON.stringify(eintraege))
}

function anzeigen(){

const liste = document.getElementById("liste")

liste.innerHTML=""

let stundenSumme = 0
let kmSumme = 0

eintraege.forEach((e,index)=>{

stundenSumme += e.stunden
kmSumme += e.km

liste.innerHTML += `

<div class="eintrag">

<b>${e.datum}</b><br>
${e.stunden} Stunden<br>
${e.km} km

</div>

`

})

document.getElementById("stundenGesamt").innerText =
stundenSumme + " h"

document.getElementById("kmGesamt").innerText =
kmSumme + " km"

}

</script>

</body>
</html>
